[graph]
all-features = false
no-default-features = false

[advisories]
# Transitive unmaintained crates via Iced/GTK3/winit forks; no actionable upgrade path yet.
unmaintained = "none"
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "quick-xml via iced/wayland; pinned by upstream" },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml via iced/wayland; pinned by upstream" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "Unlicense",
    "MIT-0",
    "NCSA",
    "CDLA-Permissive-2.0",
    "GPL-3.0-or-later",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = [
    "https://github.com/iced-rs/iced",
    "https://github.com/iced-rs/winit.git",
    "https://github.com/iced-rs/cryoglyph.git",
]
